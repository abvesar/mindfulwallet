<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; font-family: 'Segoe UI', Arial, sans-serif; background: #fafafa; padding: 15px; margin: 0; }
    .header { display: flex; align-items: center; gap: 8px; color: #2e7d32; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .stats-card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 15px; margin-top: 12px; }
    .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; color: #555; }
    .stat-value { font-weight: bold; color: #333; }
    .savings { font-size: 18px; color: #2e7d32; font-weight: bold; text-align: center; margin-top: 10px; border-top: 1px dashed #ddd; padding-top: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size: 20px;">🛡️</span>
    <h3 style="margin: 0; font-size: 16px;">MindfulWallet Panel</h3>
  </div>
  <div class="stats-card">
    <div class="stat-row"><span>Gambling Sites Blocked:</span><span class="stat-value" id="statGambling">0</span></div>
    <div class="stat-row"><span>Scams Intercepted:</span><span class="stat-value" id="statScams">0</span></div>
    <div class="stat-row"><span>Impulse Locks Active:</span><span class="stat-value" id="statLocks">0</span></div>
    <div class="savings">Estimated Saved: <span id="statSavings">₹0</span></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
