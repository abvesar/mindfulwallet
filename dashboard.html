<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MindfulWallet Developer Monitoring Console</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { color: #4caf50; border-bottom: 2px solid #2e7d32; padding-bottom: 10px; margin-bottom: 20px; }
    .status-panel { display: flex; gap: 20px; margin-bottom: 20px; }
    .stat-box { flex: 1; background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; text-align: center; }
    .stat-box h3 { margin: 0 0 5px 0; color: #888; font-size: 14px; }
    .stat-box p { margin: 0; font-size: 24px; font-weight: bold; color: #fff; }
    #log-container { background: #1e1e1e; border-radius: 8px; border: 1px solid #333; padding: 15px; max-height: 500px; overflow-y: auto; font-family: monospace; }
    .log-entry { padding: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .log-entry:last-child { border-bottom: none; }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    .badge-safe { background: #1b5e20; color: #a5d6a7; }
    .badge-scam { background: #b71c1c; color: #ef9a9a; }
    .badge-trap { background: #e65100; color: #ffcc80; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛡️ MindfulWallet // Live Inspection Matrix</h1>
    
    <div class="status-panel">
      <div class="stat-box"><h3>Total Sites Monitored</h3><p id="totalCount">0</p></div>
      <div class="stat-box"><h3>Traps Prevented</h3><p id="trapCount" style="color: #ff9800;">0</p></div>
      <div class="stat-box"><h3>Scams Neutralised</h3><p id="scamCount" style="color: #f44336;">0</p></div>
    </div>

    <h2>Live Activity Stream</h2>
    <div id="log-container">
      <!-- Live logs will be dynamically pushed here -->
      <div style="color: #666; font-style: italic; padding: 10px;" id="emptyMsg">Awaiting network traffic... Start browsing to view scan sequences.</div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
